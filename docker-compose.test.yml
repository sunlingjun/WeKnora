version: '3.8'

services:
  # 前端服务（本地构建）
  frontend:
    image: wechatopenai/weknora-ui:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: WeKnora-frontend-test
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
    depends_on:
      app:
        condition: service_healthy
    networks:
      - WeKnora-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # 后端服务（本地构建）
  app:
    image: wechatopenai/weknora-app:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.app
      args:
        - APK_MIRROR_ARG=${APK_MIRROR_ARG:-}
    container_name: WeKnora-app-test
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - data-files:/data/files
      - ./logs:/app/logs
    environment:
      - GIN_MODE=release
      - DISABLE_REGISTRATION=${DISABLE_REGISTRATION:-false}
      - DB_DRIVER=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-weknora}
      - DB_PASSWORD=${DB_PASSWORD:-weknora123456}
      - DB_NAME=${DB_NAME:-weknora}
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123456}
      - STORAGE_TYPE=minio
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY_ID=${MINIO_ACCESS_KEY_ID:-minioadmin}
      - MINIO_SECRET_ACCESS_KEY=${MINIO_SECRET_ACCESS_KEY:-minioadmin}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-weknora-files}
      - MINIO_USE_SSL=false
      - DOCREADER_ADDR=docreader:50051
      - RETRIEVE_DRIVER=postgres
      - JWT_SECRET=${JWT_SECRET:-test_jwt_secret_change_this_in_production}
      - TENANT_AES_KEY=${TENANT_AES_KEY:-test_aes_key_change_this_in_production}
      - CONCURRENCY_POOL_SIZE=3
      - AUTO_RECOVER_DIRTY=true
      - NEO4J_ENABLE=${NEO4J_ENABLE:-true}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4j123456}
      - ENABLE_GRAPH_RAG=${ENABLE_GRAPH_RAG:-true}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
      - OTEL_SERVICE_NAME=WeKnora
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - OTEL_PROPAGATORS=tracecontext,baggage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
      docreader:
        condition: service_healthy
      neo4j:
        condition: service_started
    networks:
      - WeKnora-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # PostgreSQL（开源镜像）
  postgres:
    image: paradedb/paradedb:v0.21.4-pg17
    container_name: WeKnora-postgres-test
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-weknora}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-weknora123456}
      - POSTGRES_DB=${DB_NAME:-weknora}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - WeKnora-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-weknora}"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # Redis（开源镜像）
  redis:
    image: redis:7.0-alpine
    container_name: WeKnora-redis-test
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123456}
    volumes:
      - redis-data:/data
    networks:
      - WeKnora-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # MinIO（开源镜像）
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: WeKnora-minio-test
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY_ID:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_ACCESS_KEY:-minioadmin}
    command: server --console-address ":9001" /data
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - WeKnora-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Neo4j（开源镜像）
  neo4j:
    image: neo4j:2025.10.1
    container_name: WeKnora-neo4j-test
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-neo4j123456}
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      - NEO4JLABS_PLUGINS=["apoc"]
    volumes:
      - neo4j-data:/data
    networks:
      - WeKnora-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # Docreader（开源镜像，从 Docker Hub 拉取）
  docreader:
    image: wechatopenai/weknora-docreader:latest
    container_name: WeKnora-docreader-test
    ports:
      - "${DOCREADER_PORT:-50051}:50051"
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_PUBLIC_ENDPOINT=http://localhost:${MINIO_PORT:-9000}
      - MINIO_ACCESS_KEY_ID=${MINIO_ACCESS_KEY_ID:-minioadmin}
      - MINIO_SECRET_ACCESS_KEY=${MINIO_SECRET_ACCESS_KEY:-minioadmin}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-weknora-files}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50051"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - WeKnora-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

networks:
  WeKnora-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/weknora/postgres
  redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/weknora/redis
  minio-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/weknora/minio
  neo4j-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/weknora/neo4j
  data-files:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/weknora/files
